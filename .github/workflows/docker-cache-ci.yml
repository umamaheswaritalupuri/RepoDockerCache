name: Docker Build with Cache

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main

jobs:
  jon1:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: umamaheswaritalupuri/test:latest
          cache-from: type=registry,ref=umamaheswaritalupuri/test:buildcache
          cache-to: type=registry,ref=umamaheswaritalupuri/test:buildcache,mode=max
